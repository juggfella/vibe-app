<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каталог услуг</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--tg-theme-bg-color, #1a1a1a);
            color: var(--tg-theme-text-color, #fff);
            padding: 16px;
        }

        .header {
            text-align: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--tg-theme-hint-color, #333);
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 8px;
        }

        .catalog {
            display: grid;
            gap: 16px;
        }

        .card {
            background: var(--tg-theme-secondary-bg-color, #2a2a2a);
            border-radius: 12px;
            padding: 16px;
            display: flex;
            gap: 16px;
            cursor: pointer;
            transition: transform 0.2s;
            align-items: center;
        }

        .card:active {
            transform: scale(0.98);
        }

        .card-image {
            width: 100px;
            height: 100px;
            border-radius: 8px;
            flex-shrink: 0;
            object-fit: cover;
            object-position: center top;
            cursor: pointer;
        }

        .card-content {
            flex: 1;
        }

        .card-name {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .card-description {
            font-size: 14px;
            color: var(--tg-theme-hint-color, #888);
            margin-bottom: 8px;
        }

        .card-price {
            font-size: 16px;
            font-weight: 600;
            color: var(--tg-theme-link-color, #2481cc);
        }

        .contact-btn {
            background: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #fff);
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 14px;
            margin-top: 8px;
            cursor: pointer;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            display: flex;
            padding: 20px;
        }

        .modal.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-card {
            background: var(--tg-theme-secondary-bg-color, #2a2a2a);
            border-radius: 16px;
            max-width: 400px;
            width: 100%;
            overflow: hidden;
            transform: scale(0.8);
            transition: transform 0.3s ease;
            padding: 16px;
        }

        .modal.active .modal-card {
            transform: scale(1);
        }

        .modal-card-image {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            border-radius: 12px;
            cursor: pointer;
        }

        .modal-image {
            max-width: 90%;
            max-height: 90%;
            border-radius: 12px;
            transform: scale(0.8);
            transition: transform 0.3s ease;
        }

        .modal.active .modal-image {
            transform: scale(1);
        }

        .modal-card-content {
            padding: 20px;
        }

        .modal-card-name {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .modal-card-price {
            font-size: 20px;
            font-weight: 600;
            color: var(--tg-theme-link-color, #2481cc);
            margin-bottom: 12px;
        }

        .modal-card-description {
            font-size: 16px;
            color: var(--tg-theme-hint-color, #888);
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .modal-contact-btn {
            width: 100%;
            background: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #fff);
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            color: white;
            cursor: pointer;
            background: rgba(0, 0, 0, 0.7);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
        }

        .modal-close::before {
            content: '×';
            font-size: 36px;
            line-height: 1;
            display: block;
            margin-top: -8px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>JUGGFELLA STORE</h1>
        <p>Выбери малычешку:</p>
    </div>

    <div class="catalog" id="catalog"></div>

    <div class="modal" id="modal" onclick="closeModal()">
        <div class="modal-close" onclick="closeModal()"></div>
        <div class="modal-card" id="modalCard" onclick="event.stopPropagation()">
            <img class="modal-card-image" id="modalImage" src="" alt="" onclick="openFullImage()">
            <div class="modal-card-content">
                <div class="modal-card-name" id="modalName"></div>
                <div class="modal-card-price" id="modalPrice"></div>
                <div class="modal-card-description" id="modalDescription"></div>
                <button class="modal-contact-btn" id="modalContactBtn">Написать</button>
            </div>
        </div>
    </div>

    <div class="modal" id="fullImageModal" onclick="closeFullImage()">
        <div class="modal-close" onclick="closeFullImage()"></div>
        <img class="modal-image" id="fullImage" src="" alt="" style="max-width: 90%; max-height: 90%; border-radius: 12px;">
    </div>

        // "center 30%", "center 40%" и т.д. - точная позиция в процентах

        const services = [

            },
            {
                id: 2,

            },
            {

                imagePosition: "center center"
            },
            {
                id: 5,
                name: "Таня",
                description: "Фитнес тренер",
                price: "5500₽/час",
                username: "elfiykaaaa",
                image: "https://scontent-ams2-1.cdninstagram.com/v/t51.82787-15/657724988_18094382915035793_5130316074797766308_n.jpg?stp=dst-jpg_e35_tt6&_nc_cat=100&ig_cache_key=MzExMDI5NzY4MTM1MjEzOTQ1NA%3D%3D.3-ccb7-5&ccb=7-5&_nc_sid=58cdad&efg=eyJ2ZW5jb2RlX3RhZyI6InhwaWRzLjE0NDB4MTc5Ni5zZHIuQzIifQ%3D%3D&_nc_ohc=fbmQmC3UgTQQ7kNvwEewIgn&_nc_oc=AdqJScQbjh-Zdq4OU29OvGR5KUT4CnjKE_K08F2MaZSwB1vj8tuaYm1IZR76XV15g-NWA0FtVMxHt87_I8VqgGLX&_nc_ad=z-m&_nc_cid=0&_nc_zt=23&_nc_ht=scontent-ams2-1.cdninstagram.com&_nc_gid=oSVO9d6PeQ4QwBH4zDjLvQ&_nc_ss=7a32e&oh=00_Af25A3QZFdYapNauISJMbUwNUjA4p3StGpiOXSKyQEWY5g&oe=69D88200",
                imagePosition: "center top"
            }
        ];

        function renderCatalog() {
            const catalog = document.getElementById('catalog');

            services.forEach(service => {
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => openModal(service);
                card.innerHTML = `
                    <img src="${service.image}" class="card-image" alt="${service.name}" style="object-position: ${service.imagePosition || 'center center'}">
                    <div class="card-content">
                        <div class="card-name">${service.name}</div>
                        <div class="card-description">${service.description}</div>
                        <div class="card-price">${service.price}</div>
                        <button class="contact-btn" onclick="event.stopPropagation(); openChat('${service.username}')">
                            Написать
                        </button>
                    </div>
                `;
                catalog.appendChild(card);
            });
        }

        function openChat(username) {
            tg.openTelegramLink(`https://t.me/${username}`);
        }

        let touchStartY = 0;
        let touchEndY = 0;

        function handleSwipe(element, closeFunction) {
            element.addEventListener('touchstart', (e) => {
                touchStartY = e.touches[0].clientY;
            });

            element.addEventListener('touchend', (e) => {
                touchEndY = e.changedTouches[0].clientY;
                const swipeDistance = touchStartY - touchEndY;

                if (Math.abs(swipeDistance) > 50) {
                    closeFunction();
                }
            });
        }

        function openModal(service) {
            const modalImage = document.getElementById('modalImage');
            modalImage.src = service.image;
            modalImage.style.objectPosition = service.imagePosition || 'center center';
            document.getElementById('modalName').textContent = service.name;
            document.getElementById('modalPrice').textContent = service.price;
            document.getElementById('modalDescription').textContent = service.description;
            document.getElementById('modalContactBtn').onclick = () => openChat(service.username);
            document.getElementById('modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }

        function openFullImage() {
            const modalImage = document.getElementById('modalImage');
            document.getElementById('fullImage').src = modalImage.src;
            document.getElementById('fullImageModal').classList.add('active');
        }

        function closeFullImage() {
            document.getElementById('fullImageModal').classList.remove('active');
        }

        handleSwipe(document.getElementById('modal'), closeModal);
        handleSwipe(document.getElementById('fullImageModal'), closeFullImage);

        renderCatalog();
    </script>
</body>
</html>
