<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каталог услуг</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--tg-theme-bg-color, #fff);
            color: var(--tg-theme-text-color, #000);
            padding: 16px;
        }

        .header {
            text-align: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--tg-theme-hint-color, #ccc);
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 8px;
        }

        .catalog {
            display: grid;
            gap: 16px;
        }

        .card {
            background: var(--tg-theme-secondary-bg-color, #f5f5f5);
            border-radius: 12px;
            padding: 16px;
            display: flex;
            gap: 16px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .card:active {
            transform: scale(0.98);
        }

        .card-image {
            width: 80px;
            height: 80px;
            border-radius: 8px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
        }

        .card-content {
            flex: 1;
        }

        .card-name {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .card-description {
            font-size: 14px;
            color: var(--tg-theme-hint-color, #999);
            margin-bottom: 8px;
        }

        .card-price {
            font-size: 16px;
            font-weight: 600;
            color: var(--tg-theme-link-color, #2481cc);
        }

        .contact-btn {
            background: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #fff);
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 14px;
            margin-top: 8px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Каталог услуг</h1>
        <p>Выберите специалиста</p>
    </div>

    <div class="catalog" id="catalog"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const services = [
            {
                id: 1,
                name: "Анна",
                description: "Массаж, релакс",
                price: "5000₽/час",
                username: "anna_service",
                emoji: "💆‍♀️"
            },
            {
                id: 2,
                name: "Мария",
                description: "СПА процедуры",
                price: "6000₽/час",
                username: "maria_service",
                emoji: "✨"
            },
            {
                id: 3,
                name: "Елена",
                description: "Косметология",
                price: "4500₽/час",
                username: "elena_service",
                emoji: "💅"
            },
            {
                id: 4,
                name: "Ольга",
                description: "Wellness консультации",
                price: "7000₽/час",
                username: "olga_service",
                emoji: "🌸"
            },
            {
                id: 5,
                name: "Виктория",
                description: "Фитнес тренер",
                price: "5500₽/час",
                username: "victoria_service",
                emoji: "💪"
            }
        ];

        function renderCatalog() {
            const catalog = document.getElementById('catalog');

            services.forEach(service => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="card-image">${service.emoji}</div>
                    <div class="card-content">
                        <div class="card-name">${service.name}</div>
                        <div class="card-description">${service.description}</div>
                        <div class="card-price">${service.price}</div>
                        <button class="contact-btn" onclick="openChat('${service.username}')">
                            Написать
                        </button>
                    </div>
                `;
                catalog.appendChild(card);
            });
        }

        function openChat(username) {
            tg.openTelegramLink(`https://t.me/${username}`);
        }

        renderCatalog();
    </script>
</body>
</html>
